name: React Native CI

# ¿Cuándo se ejecutará?
on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    # La máquina virtual que usará GitHub
    runs-on: ubuntu-latest

    steps:
      # 1. Copia tu código en la máquina virtual
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Configura Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm' # Esto acelera futuras ejecuciones

      # 3. Instala las dependencias
      - name: Install dependencies
        run: npm ci

      # 4. Verificación de salud (Opcional pero útil)
      - name: Check environment
        run: |
          node -v
          npm -v
          echo "¡El entorno está listo para trabajar!"
